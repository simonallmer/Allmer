<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Allmer</title>

    <!-- React & ReactDOM -->

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for JSX -->

    <!-- Tailwind CSS -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;700&display=swap');

        body {
            font-family: 'Playfair Display', serif;
        }

        h1,
        h2,
        h3,
        .brand-font {
            font-family: 'Cinzel', serif;
        }

        /* Custom scrollbar to match the theme */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border: 1px solid #000;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #D4AF37;
        }

        /* Filter to turn black image to Gold (#D4AF37) */
        .gold-filter {
            filter: invert(76%) sepia(13%) saturate(1478%) hue-rotate(1deg) brightness(93%) contrast(87%);
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
        }

        /* Table Styles for Profile */
        .profile-table th {
            background-color: #1a1a1a;
            color: #D4AF37;
            text-align: left;
            padding: 12px;
            border: 1px solid #333;
            width: 30%;
            font-weight: normal;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        .profile-table td {
            padding: 12px;
            border: 1px solid #333;
            color: #ccc;
            font-size: 0.9rem;
        }
    </style>
</head>

<body class="bg-black text-gray-200 overflow-hidden">

                    <div className="max-w-xl mx-auto text-gray-300 font-serif leading-loose italic">

                            className={`flex flex-col items-center group cursor-pointer transition-all ${selectedPrinciple === 'magic' ? 'scale-110' : ''}`}
                            onClick={() => setSelectedPrinciple(selectedPrinciple === 'magic' ? null : 'magic')}
                        >
                            <Wand className={`w-8 h-8 mb-4 transition-all ${selectedPrinciple === 'magic' ? 'text-white scale-110' : 'text-[#D4AF37] group-hover:scale-110'}`} />

            const daysInYear = 365;
            const TODAY_INDEX = 79;
            const [hoveredDay, setHoveredDay] = useState(null);
            const [viewMode, setViewMode] = useState('year');
            const [selectedMonth, setSelectedMonth] = useState(2);

            const getDaysInYear = (year) => {
                return ((year % 4 === 0 && year % 100 > 0) || year % 400 === 0) ? 366 : 365;
            };

            const polarToCartesian = (centerX, centerY, radius, angleInDegrees) => {
                const angleInRadians = ((angleInDegrees - 90) * Math.PI) / 180.0;
                return {
                    x: centerX + radius * Math.cos(angleInRadians),
                    y: centerY + radius * Math.sin(angleInRadians)
                };
            };

            const describeArc = (x, y, innerRadius, outerRadius, startAngle, endAngle) => {
                const startOuter = polarToCartesian(x, y, outerRadius, endAngle);
                const endOuter = polarToCartesian(x, y, outerRadius, startAngle);
                const startInner = polarToCartesian(x, y, innerRadius, endAngle);
                const endInner = polarToCartesian(x, y, innerRadius, startAngle);
                const largeArcFlag = endAngle - startAngle <= 180 ? "0" : "1";
                const d = [
                    "M", startOuter.x, startOuter.y,
                    "A", outerRadius, outerRadius, 0, largeArcFlag, 0, endOuter.x, endOuter.y,
                    "L", endInner.x, endInner.y,
                    "A", innerRadius, innerRadius, 0, largeArcFlag, 1, startInner.x, startInner.y,
                    "Z"
                ].join(" ");
                return d;
            };

            const getColorForRevenue = (revenue) => {
                if (revenue === 0) return '#991b1b';
                if (revenue < 5) return '#c2410c';
                if (revenue < 10) return '#1d4ed8';
                if (revenue < 20) return '#0d9488';
                return '#15803d';
            };

            const getStatusText = (revenue) => {
                if (revenue === 0) return 'No Revenue';
                if (revenue < 5) return 'Below Threshold';
                if (revenue < 10) return 'Basic Needs';
                if (revenue < 20) return 'Comfortable';
                return 'Antifragile';
            };

            const monthStarts = [
                { name: 'Jan', day: 0, index: 0 }, { name: 'Feb', day: 31, index: 1 }, { name: 'Mar', day: 59, index: 2 },
                { name: 'Apr', day: 90, index: 3 }, { name: 'May', day: 120, index: 4 }, { name: 'Jun', day: 151, index: 5 },
                { name: 'Jul', day: 181, index: 6 }, { name: 'Aug', day: 212, index: 7 }, { name: 'Sep', day: 243, index: 8 },
                { name: 'Oct', day: 273, index: 9 }, { name: 'Nov', day: 304, index: 10 }, { name: 'Dec', day: 334, index: 11 }
            ];

            const monthNamesFull = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const daysOfWeek = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

            const [data, setData] = useState(() => {
                return Array.from({ length: daysInYear }).map((_, i) => {
                    const date = new Date(2026, 0, 1);
                    date.setDate(i + 1);
                    let revenue = 0;
                    let source = '';
                    if (i === TODAY_INDEX) { revenue = 5.00; source = 'Customer 000000006'; }
                    else if (i === TODAY_INDEX + 2) revenue = 3.00;
                    else if (i === TODAY_INDEX + 3) revenue = 25.00;
                    return { dayOfYear: i, date, revenue, source };
                });
            });

            const simulateGrowth = () => {
                setData(prev => prev.map((day, i) => {
                    if (i <= TODAY_INDEX + 3) return day;
                    const progress = (i - TODAY_INDEX) / (daysInYear - TODAY_INDEX);
                    const isSubscribed = Math.random() < (0.2 + (progress * 0.8));
                    let newRev = 0;
                    let newSource = '';
                    if (isSubscribed) {
                        const rand = Math.random();
                        if (rand < 0.3 - (progress * 0.2)) newRev = Math.floor(Math.random() * 4) + 1;
                        else if (rand < 0.6 - (progress * 0.1)) newRev = Math.floor(Math.random() * 5) + 5;
                        else if (rand < 0.8) newRev = Math.floor(Math.random() * 10) + 10;
                        else newRev = Math.floor(Math.random() * 30) + 20;
                        newSource = 'Simulated Sub';
                    }
                    return { ...day, revenue: newRev, source: newSource };
                }));
            };

            const currentDisplayDay = hoveredDay !== null ? data[hoveredDay] : data[TODAY_INDEX];

            const handleMonthJump = (monthIndex) => {
                setSelectedMonth(monthIndex);
                setViewMode('month');
            };

            const getCardStylesForRevenue = (revenue) => {
                if (revenue === 0) return 'bg-red-900/10 border-red-900/30 text-red-400 hover:bg-red-900/20';
                if (revenue < 5) return 'bg-orange-900/10 border-orange-900/30 text-orange-400 hover:bg-orange-900/20';
                if (revenue < 10) return 'bg-blue-900/10 border-blue-900/30 text-blue-400 hover:bg-blue-900/20';
                if (revenue < 20) return 'bg-teal-900/10 border-teal-900/30 text-teal-400 hover:bg-teal-900/20';
                return 'bg-green-900/10 border-green-900/30 text-green-400 hover:bg-green-900/20';
            };

            const monthDaysData = data.filter(d => d.date.getMonth() === selectedMonth);
            const firstDayOfMonthObj = new Date(2026, selectedMonth, 1);
            const firstDayOfWeek = firstDayOfMonthObj.getDay();
            const emptyDaysStart = (firstDayOfWeek + 6) % 7;
            const paddingArray = Array.from({ length: emptyDaysStart }).map((_, i) => i);

            return (
                <div className="flex-1 bg-black min-h-full p-8 pb-20 text-white font-serif relative overflow-hidden">
                    <div className="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/dark-leather.png')] pointer-events-none"></div>

                                </button>
