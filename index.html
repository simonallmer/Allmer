<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="googlebot" content="noindex" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Allmer</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

<style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;700&display=swap');

        body {
            font-family: 'Playfair Display', serif;
        }

        h1,
        h2,
        h3,
        .brand-font {
            font-family: 'Cinzel', serif;
        }

        @font-face {
            font-family: 'Royal Signage';
            src: url('./fonts/RoyalSignage-Rg.ttf') format('truetype');
        }

        .royal-font {
            font-family: 'Royal Signage', serif;
            letter-spacing: normal;
        }

        /* Custom scrollbar to match the theme */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border: 1px solid #000;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #D4AF37;
        }

        /* Filter to turn black image to Gold (#D4AF37) */
        .gold-filter {
            filter: invert(76%) sepia(13%) saturate(1478%) hue-rotate(1deg) brightness(93%) contrast(87%);
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
        }

        /* Table Styles for Profile */
        .profile-table th {
            background-color: #1a1a1a;
            color: #D4AF37;
            text-align: left;
            padding: 12px;
            border: 1px solid #333;
            width: 30%;
            font-weight: normal;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
        }

        .profile-table td {
            padding: 12px;
            border: 1px solid #333;
            color: #ccc;
            font-size: 0.9rem;
        }
    </style>
</head>

<body class="bg-black text-gray-200 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICON COMPONENTS (Inline for standalone usage) ---
        const IconWrapper = ({ children, className }) => (
            <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24" height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                strokeWidth="2"
                strokeLinecap="round"
                strokeLinejoin="round"
                className={className}
            >
                {children}
            </svg>
        );

        const Music = (props) => <IconWrapper {...props}><path d="M9 18V5l12-2v13" /><circle cx="6" cy="18" r="3" /><circle cx="18" cy="16" r="3" /></IconWrapper>;
        const Film = (props) => <IconWrapper {...props}><rect width="18" height="18" x="3" y="3" rx="2" /><path d="M7 3v18" /><path d="M3 7.5h4" /><path d="M3 12h18" /><path d="M3 16.5h4" /><path d="M17 3v18" /><path d="M17 7.5h4" /><path d="M17 16.5h4" /></IconWrapper>;
        const BookOpen = (props) => <IconWrapper {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></IconWrapper>;
        const Gamepad2 = (props) => <IconWrapper {...props}><line x1="6" x2="10" y1="11" y2="11" /><line x1="8" x2="8" y1="9" y2="13" /><line x1="15" x2="15.01" y1="12" y2="12" /><line x1="18" x2="18.01" y1="10" y2="10" /><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z" /></IconWrapper>;
        const Coffee = (props) => <IconWrapper {...props}><path d="M17 8h1a4 4 0 1 1 0 8h-1" /><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z" /><line x1="6" x2="6" y1="1" y2="4" /><line x1="10" x2="10" y1="1" y2="4" /><line x1="14" x2="14" y1="1" y2="4" /></IconWrapper>;
        const Smile = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10" /><path d="M8 14s1.5 2 4 2 4-2 4-2" /><line x1="9" x2="9.01" y1="9" y2="9" /><line x1="15" x2="15.01" y1="9" y2="9" /></IconWrapper>;
        const Globe = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10" /><line x1="2" x2="22" y1="12" y2="12" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></IconWrapper>;
        const Briefcase = (props) => <IconWrapper {...props}><rect width="20" height="14" x="2" y="7" rx="2" ry="2" /><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" /></IconWrapper>;
        const Home = (props) => <IconWrapper {...props}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></IconWrapper>;
        const DollarSign = (props) => <IconWrapper {...props}><line x1="12" x2="12" y1="2" y2="22" /><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" /></IconWrapper>;
        const Mail = (props) => <IconWrapper {...props}><rect width="20" height="16" x="2" y="4" rx="2" /><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" /></IconWrapper>;
        const Gem = (props) => <IconWrapper {...props}><path d="M6 3h12l4 6-10 13L2 9Z" /><path d="M11 3 8 9l4 13 4-13-3-6" /></IconWrapper>;
        const Award = (props) => <IconWrapper {...props}><circle cx="12" cy="8" r="7" /><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88" /></IconWrapper>;
        const Scroll = (props) => <IconWrapper {...props}><path d="M8 17a5 5 0 0 1 5-5 4 4 0 0 0 4-4 4 4 0 0 1 4 4v9a5 5 0 0 1-5 5 4 4 0 0 0-4 4 4 4 0 0 1-4-4V6a5 5 0 0 1 5-5 4 4 0 0 0 4 4" /></IconWrapper>;
        const Lightbulb = (props) => <IconWrapper {...props}><line x1="9" x2="15" y1="18" y2="18" /><line x1="10" x2="14" y1="22" y2="22" /><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 12 3 4.65 4.65 0 0 0 7.5 11.5c0 1.16.52 2.27 1.41 2.5" /></IconWrapper>;
        const Wand = (props) => <IconWrapper {...props}><path d="M15 4V2" /><path d="M15 16v-2" /><path d="M8 9h2" /><path d="M20 9h2" /><path d="M17.8 11.8 19 13" /><path d="M15 9h0" /><path d="M17.8 6.2 19 5" /><path d="m3 21 9-9" /><path d="M12.2 6.2 11 5" /></IconWrapper>;
        const Feather = (props) => <IconWrapper {...props}><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z" /><line x1="16" x2="2" y1="8" y2="22" /><line x1="17.5" x2="9" y1="15" y2="15" /></IconWrapper>;
        const TerminalIcon = (props) => <IconWrapper {...props}><polyline points="4 17 10 11 4 5" /><line x1="12" x2="20" y1="19" y2="19" /></IconWrapper>;
        const ExternalLink = (props) => <IconWrapper {...props}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" x2="21" y1="14" y2="3" /></IconWrapper>;
        const Mic = (props) => <IconWrapper {...props}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" /><path d="M19 10v2a7 7 0 0 1-14 0v-2" /><line x1="12" x2="12" y1="19" y2="22" /></IconWrapper>;
        const Monitor = (props) => <IconWrapper {...props}><rect width="20" height="14" x="2" y="3" rx="2" /><line x1="8" x2="16" y1="21" y2="21" /><line x1="12" x2="12" y1="17" y2="21" /></IconWrapper>;
        const Footprints = (props) => <IconWrapper {...props}><path d="M4 16v-2.38C4 11.5 5.81 10.5 7 10.5s3 1 3 3.12V16" /><path d="M14 16v-2.38C14 11.5 15.81 10.5 17 10.5s3 1 3 3.12V16" /><path d="M12 21a2 2 0 0 1-2-2" /><path d="M18 21a2 2 0 0 1-2-2" /><circle cx="7" cy="18" r="2" /><circle cx="17" cy="18" r="2" /></IconWrapper>;
        const Piano = (props) => <IconWrapper {...props}><path d="M2 18v-6c0-4 4-8 10-8h8l2 2v12c0 2-2 2-2 2H4s-2 0-2-2Z" /><path d="M6 12v6" /><path d="M10 12v6" /><path d="M14 12v6" /><path d="M18 12v6" /><path d="M2 12h20" /></IconWrapper>;
        const Guitar = (props) => <IconWrapper {...props}><path d="M9 16c0 2.2 1.8 4 4 4s4-1.8 4-4-1.8-4-4-4-4 1.8-4 4Z" /><path d="m14.5 12.5 5-5" /><path d="M18.5 8.5c1-1 3-1.5 4-.5s.5 3-.5 4c-1 1-3 1.5-4 .5s-.5-3 .5-4Z" /><path d="m11 14-8 8" /><path d="m13 12-6 6" /></IconWrapper>;
        const Club = (props) => <IconWrapper {...props}><path d="M12 2a3 3 0 0 1 3 3c0 1.5-1 3.5-3 5-2-1.5-3-3.5-3-5a3 3 0 0 1 3-3Z" /><path d="M7 10a3 3 0 1 1 3-3c0 1.5-1 3.5-3 5-2-1.5-3-3.5-3-5a3 3 0 0 1 3 3Z" /><path d="M17 10a3 3 0 1 1 3-3c0 1.5-1 3.5-3 5-2-1.5-3-3.5-3-5a3 3 0 0 1 3 3Z" /><path d="M12 12s-1 1-1 3v2h2v-2s0-3-1-3Z" /></IconWrapper>;
        const Dices = (props) => <IconWrapper {...props}><rect width="12" height="12" x="2" y="10" rx="2" /><rect width="12" height="12" x="10" y="2" rx="2" /><path d="m14 14 3-3" /><path d="M15 14h.01" /><path d="M18 11h.01" /><path d="M12 10.01h.01" /></IconWrapper>;
        const Search = (props) => <IconWrapper {...props}><circle cx="11" cy="11" r="8" /><line x1="21" x2="16.65" y1="21" y2="16.65" /></IconWrapper>;
        const X = (props) => <IconWrapper {...props}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></IconWrapper>;
        const Newspaper = (props) => <IconWrapper {...props}><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2" /><path d="M18 14h-8" /><path d="M15 18h-5" /><path d="M10 6h8v4h-8V6Z" /></IconWrapper>;
        const Circle = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10" /></IconWrapper>;

        // --- MAIN APP CODE ---

        const LuxuryButton = ({ children, onClick, active, collapsed }) => (
            <button
                onClick={onClick}
                className={`
              ${collapsed ? 'px-2 py-2' : 'w-full mb-3 px-4 py-2'} text-center font-serif text-sm tracking-widest transition-all duration-300 brand-font
              ${active
                        ? 'bg-[#D4AF37] text-black border-2 border-[#D4AF37] shadow-[0_0_10px_#D4AF37]'
                        : 'bg-black text-[#D4AF37] border-2 border-[#D4AF37] hover:bg-[#1a1a1a]'}
            `}
            >
                {collapsed ? children.charAt(0) : children}
            </button>
        );

        const SectionHeader = ({ title, subtitle }) => (
            <div className="mb-8 text-center">
                <div className="flex items-center justify-center gap-4 mb-2">
                    <div className="h-[1px] w-12 bg-[#D4AF37]" />
                    <h2 className="text-3xl font-serif text-[#D4AF37] uppercase tracking-[0.2em] brand-font">
                        {title}
                    </h2>
                    <div className="h-[1px] w-12 bg-[#D4AF37]" />
                </div>
                {subtitle && <p className="text-gray-400 font-serif italic text-sm">{subtitle}</p>}
                <div className="mx-auto w-24 h-1 bg-gradient-to-r from-transparent via-[#D4AF37] to-transparent mt-4" />
            </div>
        );

        // --- COMPONENTS ---
        const HomePillar = ({ navigate }) => {
            const [selectedPrinciple, setSelectedPrinciple] = useState(null);

            const principles = {
                story: {
                    title: 'Serve the Story',
                    text: 'Creative decisions must strengthen the narrative and make it as engaging as possible.',
                    icon: Feather
                },
                magic: {
                    title: 'Magic is Real',
                    text: 'The defining craft of each Studio is created by humans, not machines.',
                    icon: Wand
                },
                invention: {
                    title: 'Invent or Die',
                    text: 'Products must be boldly original, bring true value to people, and be constantly improved to deliver the best experience.',
                    icon: Lightbulb
                }
            };

            return (
                <div className="flex-1 text-center space-y-10 py-10 px-8 pb-20 bg-black min-h-full flex flex-col items-center justify-center">

                    <div className="p-1 inline-block animate-in fade-in duration-1000">
                        <img src="allmer_logo_new.png" alt="Allmer" className="h-16 md:h-20 object-contain gold-filter" />
                    </div>

                    <div className="max-w-xl mx-auto text-gray-300 font-serif leading-loose italic">
                        <p>
                            Committed to creative excellence, Allmer produces story-driven entertainment and consumer products for a global audience.
                        </p>
                    </div>

                    <div className="grid grid-cols-3 gap-12 max-w-2xl mx-auto pt-8 border-t border-[#333]">
                        <div 
                            className={`flex flex-col items-center group cursor-pointer transition-all ${selectedPrinciple === 'story' ? 'scale-110' : ''}`}
                            onClick={() => setSelectedPrinciple(selectedPrinciple === 'story' ? null : 'story')}
                        >
                            <Feather className={`w-8 h-8 mb-4 transition-all ${selectedPrinciple === 'story' ? 'text-white scale-110' : 'text-[#D4AF37] group-hover:scale-110'}`} />
                            <span className={`font-serif text-xs uppercase tracking-widest brand-font transition-colors ${selectedPrinciple === 'story' ? 'text-white' : 'text-gray-400 group-hover:text-white'}`}>Story</span>
                        </div>
                        <div 
                            className={`flex flex-col items-center group cursor-pointer transition-all ${selectedPrinciple === 'magic' ? 'scale-110' : ''}`}
                            onClick={() => setSelectedPrinciple(selectedPrinciple === 'magic' ? null : 'magic')}
                        >
                            <Wand className={`w-8 h-8 mb-4 transition-all ${selectedPrinciple === 'magic' ? 'text-white scale-110' : 'text-[#D4AF37] group-hover:scale-110'}`} />
                            <span className={`font-serif text-xs uppercase tracking-widest brand-font transition-colors ${selectedPrinciple === 'magic' ? 'text-white' : 'text-gray-400 group-hover:text-white'}`}>Magic</span>
                        </div>
                        <div 
                            className={`flex flex-col items-center group cursor-pointer transition-all ${selectedPrinciple === 'invention' ? 'scale-110' : ''}`}
                            onClick={() => setSelectedPrinciple(selectedPrinciple === 'invention' ? null : 'invention')}
                        >
                            <Lightbulb className={`w-8 h-8 mb-4 transition-all ${selectedPrinciple === 'invention' ? 'text-white scale-110' : 'text-[#D4AF37] group-hover:scale-110'}`} />
                            <span className={`font-serif text-xs uppercase tracking-widest brand-font transition-colors ${selectedPrinciple === 'invention' ? 'text-white' : 'text-gray-400 group-hover:text-white'}`}>Invention</span>
                        </div>
                    </div>

                    {/* Principle Explanation */}
                    {selectedPrinciple && (
                        <div className="max-w-xl mx-auto mt-8 p-6 border border-[#D4AF37] bg-[#0a0a0a] animate-in fade-in slide-in-from-bottom-4 duration-300">
                            <div className="flex items-start gap-4 text-left">
                                <span className="text-[#D4AF37] text-lg">◈</span>
                                <div>
                                    <h3 className="text-[#D4AF37] brand-font text-lg mb-2">{principles[selectedPrinciple].title}</h3>
                                    <p className="text-gray-300 text-sm leading-relaxed">{principles[selectedPrinciple].text}</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- NEW PAGES ---
        const ProfilePillar = () => (
            <div className="flex-1 bg-black min-h-full p-8 pb-20 text-white flex flex-col items-center">
                <SectionHeader title="Corporate Profile" subtitle="Company Overview" />

                <div className="w-full max-w-3xl border border-[#333] p-1">
                    <div className="border border-[#D4AF37] p-6 bg-[#0a0a0a]">
                        <table className="w-full border-collapse profile-table">
                            <tbody>
                                <tr>
                                    <th>Company Name</th>
                                    <td>Allmer Group</td>
                                </tr>
                                <tr>
                                    <th>Chairman</th>
                                    <td>Simon Allmer</td>
                                </tr>
                                <tr>
                                    <th>Date Founded</th>
                                    <td>2020</td>
                                </tr>
                                <tr>
                                    <th>Financial Assets</th>
                                    <td>€125.00 (Liquid Assets)</td>
                                </tr>
                                <tr>
                                    <th>Main Business Activities</th>
                                    <td>
                                        <ul className="list-disc list-inside">
                                            <li>Story-driven Entertainment Production</li>
                                            <li>Real Estate Management & Acquisition</li>
                                            <li>Strategic Financial Investment</li>
                                        </ul>
                                    </td>
                                </tr>
                                <tr>
                                    <th>Head Office</th>
                                    <td>
                                        Vienna, Austria<br />
                                        <span className="text-gray-500 text-xs italic">Operating globally in Paris & London</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        );

        const PrinciplesPillar = () => (
            <div className="flex-1 bg-[#080808] min-h-full p-8 pb-20 text-white flex flex-col items-center">
                <SectionHeader title="Our Principles" subtitle="The Foundation of Allmer" />

                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-5xl mt-8">
                    <div className="border border-[#222] p-8 text-center hover:border-[#D4AF37] transition-colors group">
                        <Feather className="text-[#D4AF37] w-12 h-12 mx-auto mb-6 group-hover:scale-110 transition-transform" />
                        <h3 className="text-[#D4AF37] brand-font text-lg mb-4">Story</h3>
                        <p className="text-gray-400 text-sm leading-relaxed">
                            Narrative is the currency of connection. Every product, every estate, and every investment must tell a compelling story that resonates across generations.
                        </p>
                    </div>
                    <div className="border border-[#222] p-8 text-center hover:border-[#D4AF37] transition-colors group">
                        <Wand className="text-[#D4AF37] w-12 h-12 mx-auto mb-6 group-hover:scale-110 transition-transform" />
                        <h3 className="text-[#D4AF37] brand-font text-lg mb-4">Magic</h3>
                        <p className="text-gray-400 text-sm leading-relaxed">
                            We pursue the extraordinary. The "Allmer Touch" is the invisible quality that transforms the mundane into the magical, creating wonder in every interaction.
                        </p>
                    </div>
                    <div className="border border-[#222] p-8 text-center hover:border-[#D4AF37] transition-colors group">
                        <Lightbulb className="text-[#D4AF37] w-12 h-12 mx-auto mb-6 group-hover:scale-110 transition-transform" />
                        <h3 className="text-[#D4AF37] brand-font text-lg mb-4">Invention</h3>
                        <p className="text-gray-400 text-sm leading-relaxed">
                            Tradition guides us; innovation drives us. We relentlessly invent new ways to entertain, house, and inspire the world, never settling for the status quo.
                        </p>
                    </div>
                </div>
            </div>
        );

        const ArtsPillar = ({ onSelectStudio }) => (
            <div className="flex-1 bg-black min-h-full p-8 pb-20 text-white relative overflow-hidden">
                <div className="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/black-mamba.png')] pointer-events-none"></div>

                <SectionHeader title="Subsidiaries" subtitle="Curated Entertainment Divisions" />

                <div className="max-w-4xl mx-auto">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                        <div className="col-span-1 md:col-span-2 text-center mb-4">
                            <h3 className="text-[#D4AF37] font-serif text-xl border-b border-[#333] inline-block pb-2 mb-2 brand-font">
                                Simon Allmer Entertainment
                            </h3>
                            <p className="text-[#D4AF37] text-[10px] uppercase tracking-widest mb-1">Est. 2020</p>
                            <a href="https://simonallmer.com" target="_blank" className="text-[#D4AF37] text-[10px] font-mono hover:text-white transition-colors flex items-center justify-center gap-1">
                                simonallmer.com <ExternalLink className="w-3 h-3" />
                            </a>
                        </div>

                        {[
                            { name: 'Allmer Comics', desc: "Graphic Novels", url: "allmercomics.com" },
                            { name: 'Allmer Films', desc: "Motion Pictures", url: "allmerfilms.com" },
                            { name: 'Allmer Music', desc: "Fine Music", url: "allmermusic.com" },
                            { name: 'Allmer Games', desc: "Interactive", url: "allmergames.com" },
                            { name: 'Allmer Journals', desc: "Literature", url: "allmerjournals.com" },
                            { name: 'Allmer Snacks', desc: "Gastronomy", url: "allmersnacks.com" }
                        ].map((div) => (
                            <div
                                key={div.name}
                                className="flex flex-col justify-between p-6 border border-[#222] hover:border-[#D4AF37] transition-colors bg-[#050505]"
                            >
                                <div>
                                    <span className="block text-[#D4AF37] font-serif tracking-widest text-base brand-font mb-1">{div.name.toUpperCase()}</span>
                                    <span className="text-xs text-gray-500 font-serif italic block mb-3">{div.desc}</span>
                                    <p className="text-gray-400 text-sm">Text coming soon.</p>
                                </div>
                                <div className="mt-4 pt-3 border-t border-[#333]">
                                    <a href={`https://${div.url}`} target="_blank" className="text-[#D4AF37] text-[10px] font-mono hover:text-white transition-colors flex items-center gap-1">
                                        {div.url} <ExternalLink className="w-3 h-3" />
                                    </a>

                                    <div className="flex flex-col items-center">
                                        <span>{tool.skill}</span>
                                        {tool.url && <span className="text-[8px] text-gray-500 mt-1">Visit Website ↗</span>}
                                        {tool.interactive && <span className="text-[8px] text-gray-500 mt-1">Open System ↵</span>}
                                    </div>
                                </div>
                            </div>
                            <div className="mt-4 text-[9px] text-gray-600 uppercase tracking-[0.3em] group-hover:text-[#D4AF37] transition-colors brand-font font-bold">
                                {tool.label}
                            </div>
                        </div>
                    ))}

                    {activeTool === 'monitor' && (
                        <div className="absolute inset-0 bg-black/90 z-[70] flex flex-col items-center justify-center p-8 animate-in fade-in duration-300">
                            <button onClick={() => setActiveTool(null)} className="absolute top-4 right-4 text-[#D4AF37] text-2xl hover:text-white transition-colors">&times;</button>
                            <h4 className="text-[#D4AF37] brand-font text-xl mb-8 border-b border-[#333] pb-2 uppercase tracking-widest">Development Suite</h4>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-2xl">
                                <a href="https://www.blender.org" target="_blank" className="border border-[#222] p-6 hover:border-[#D4AF37] bg-[#080808] transition-all group">
                                    <h5 className="text-[#D4AF37] brand-font mb-2">Blender</h5>
                                    <p className="text-gray-400 text-xs leading-relaxed">The industry standard open-source 3D creation suite for modeling, animation, and rendering.</p>
                                </a>
                                <a href="https://deepmind.google/discover/blog/genie-generative-interactive-environments/" target="_blank" className="border border-[#222] p-6 hover:border-[#D4AF37] bg-[#080808] transition-all group">
                                    <h5 className="text-[#D4AF37] brand-font mb-2">Google Genie</h5>
                                    <p className="text-gray-400 text-xs leading-relaxed">Generative Interactive Environments: Advanced AI models capable of generating playable 2D worlds.</p>
                                </a>
                            </div>
                        </div>
                    )}

                    <div className="absolute bottom-6 left-1/2 -translate-x-1/2 text-[10px] text-gray-700 uppercase tracking-[0.3em] brand-font font-bold">
                        Interactive Games Studio Environment
                    </div>
                </div>
            );
        };


        const StudioModal = ({ studio, onClose }) => {
            if (!studio) return null;
            return (
                <div className="fixed inset-0 modal-overlay z-[60] flex items-center justify-center p-4">
                    <div className="bg-black border-2 border-[#D4AF37] w-full max-w-4xl relative shadow-[0_0_50px_rgba(212,175,55,0.1)] overflow-hidden">
                        <div className="p-6 border-b border-[#222] flex justify-between items-center bg-[#050505]">
                            <div>
                                <h3 className="text-[#D4AF37] brand-font text-2xl tracking-widest">{studio.name.toUpperCase()}</h3>
                                <p className="text-gray-500 text-xs uppercase tracking-widest">{studio.desc}</p>
                            </div>
                            <button onClick={onClose} className="text-[#D4AF37] text-3xl hover:text-white transition-colors">&times;</button>
                        </div>

                        <div className="p-8">
                            {studio.name === 'Allmer Music' ? (
                                <MusicStudioRoom />
                            ) : studio.name === 'Allmer Films' ? (
                                <FilmStudioRoom />
                            ) : studio.name === 'Allmer Games' ? (
                                <GamesStudioRoom />
                            ) : (
                                <div className="h-[400px] flex flex-col items-center justify-center text-center space-y-6">
                                    <div className="text-[#D4AF37] opacity-20">{studio.icon}</div>
                                    <div>
                                        <h4 className="text-white brand-font text-xl mb-4">Studio Archives</h4>
                                        <p className="text-gray-400 max-w-md mx-auto italic">
                                            The digital repository for {studio.name} is currently being curated. Content will be available in the upcoming portfolio expansion.
                                        </p>
                                    </div>
                                    <div className="w-12 h-[1px] bg-[#D4AF37]"></div>
                                    <p className="text-[10px] text-gray-600 uppercase tracking-[0.4em]">Proprietary Content</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

const publicMenuItems = [
            { id: 'arts', label: 'SUBSIDIARIES' },
            { id: 'assets', label: 'ASSETS' },
            { id: 'catalog', label: 'CATALOG' },
            { id: 'lexicon', label: 'LEXICON' },
            { id: 'worldmap', label: 'LOCATIONS' },
        ];

        const privateMenuItems = [
            { id: 'arts', label: 'SUBSIDIARIES' },
            { id: 'assets', label: 'ASSETS' },
            { id: 'projected', label: 'SUBSCRIPTIONS' },
            { id: 'catalog', label: 'CATALOG' },
            { id: 'stakeholders', label: 'STAKEHOLDERS' },
            { id: 'lexicon', label: 'LEXICON' },
            { id: 'publications', label: 'PUBLICATIONS' },
            { id: 'worldmap', label: 'LOCATIONS' },
        ];

        let menuItems = publicMenuItems;

        const LoginScreen = ({ onAuthorize }) => {
            const [password, setPassword] = useState('');
            const [error, setError] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (password === '2020') {
                    onAuthorize();
                } else {
                    setError(true);
                    setPassword('');
                }
            };

            return (
                <div className="fixed inset-0 bg-black flex items-center justify-center z-[100] animate-in fade-in duration-500">
                    <div className="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/dark-leather.png')] pointer-events-none"></div>
                    
                    <div className="max-w-md w-full p-12 border border-[#D4AF37] bg-[#0a0a0a] shadow-[0_0_80px_rgba(212,175,55,0.1)] relative text-center">
                        <div className="mb-8 p-1 inline-block">
                            <img src="allmer_logo.png" alt="Allmer" className="h-16 object-contain" />
                        </div>
                        
                        <h2 className="text-[#D4AF37] brand-font text-lg mb-8 uppercase tracking-[0.4em]">Secure Access</h2>
                        
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div className="relative">
                                <input 
                                    autoFocus
                                    type="password"
                                    value={password}
                                    onChange={(e) => { setPassword(e.target.value); setError(false); }}
                                    className={`w-full bg-black border ${error ? 'border-red-500' : 'border-[#333] focus:border-[#D4AF37]'} p-4 text-center text-white text-xl tracking-[1em] outline-none transition-all duration-300 placeholder-transparent select-all`}
                                    placeholder="••••"
                                / >
                                <p className="text-gray-600 text-[8px] uppercase tracking-widest mt-2">Enter credentials to establish uplink</p>
                            </div>

                            {error && (
                                <p className="text-red-500 text-[10px] uppercase tracking-widest animate-pulse">Access Denied — Invalid Sequence</p>
                            )}
                            
                            <button 
                                type="submit"
                                className="w-full py-4 border border-[#D4AF37] text-[#D4AF37] text-[10px] uppercase tracking-[0.5em] font-bold hover:bg-[#D4AF37] hover:text-black transition-all bg-black cursor-pointer"
                            >
                                Authorize
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [selectedStudio, setSelectedStudio] = useState(null);
            const [showMenu, setShowMenu] = useState(false);
            const [isPrivateMode, setIsPrivateMode] = useState(() => localStorage.getItem('allmer_isPrivate') === 'true');
            const [showPinModal, setShowPinModal] = useState(false);
            const [pinInput, setPinInput] = useState('');

            const currentMenuItems = isPrivateMode ? privateMenuItems : publicMenuItems;

            const authenticatePrivate = (pin) => {
                if (pin === '2020') {
                    localStorage.setItem('allmer_isPrivate', 'true');
                    localStorage.setItem('allmer_authTime', Date.now().toString());
                    setIsPrivateMode(true);
                    setShowPinModal(false);
                    setPinInput('');
                }
            };

            const handleTogglePrivate = () => {
                if (isPrivateMode) {
                    localStorage.setItem('allmer_isPrivate', 'false');
                    setIsPrivateMode(false);
                    setActiveTab('home');
                } else {
                    setShowPinModal(true);
                }
            };

            const handleAuthenticatedAccess = () => {
                authenticatePrivate(pinInput);
            };

            const currentMenuItems = isPrivateMode ? privateMenuItems : publicMenuItems;

            React.useEffect(() => {
                // Check auth on mount
                const authTime = localStorage.getItem('allmer_authTime');
                if (authTime && Date.now() - parseInt(authTime) < 30 * 24 * 60 * 60 * 1000) {
                    setIsPrivateMode(true);
                }

                const handleKeyDown = (e) => {
                    if (e.code === 'Space' && e.target === document.body) {
                        e.preventDefault();
                        setShowMenu(prev => !prev);
                    }
                    
                    // Number key shortcuts (1-7)
                    const keyNum = parseInt(e.key);
                    if (!isNaN(keyNum) && keyNum >= 1 && keyNum <= menuItems.length) {
                        const item = menuItems[keyNum - 1];
                        setActiveTab(item.id);
                        setShowMenu(false);
                    }

                    // Comma (backward) and Period (forward)
                    if (e.key === ',' || e.key === '<' || e.key === '.' || e.key === '>') {
                        const currentIndex = menuItems.findIndex(item => item.id === activeTab);
                        let nextIndex;

                        if (e.key === ',' || e.key === '<') {
                            // If on home or not in menu, go to last item
                            // If in menu, go back one
                            nextIndex = currentIndex === -1 ? menuItems.length - 1 : (currentIndex - 1 + menuItems.length) % menuItems.length;
                        } else {
                            // If on home or not in menu, go to first item
                            // If in menu, go forward one
                            nextIndex = currentIndex === -1 ? 0 : (currentIndex + 1) % menuItems.length;
                        }

                        setActiveTab(menuItems[nextIndex].id);
                        setShowMenu(false);
                    }

                    // 0 (Home/Main Menu)
                    if (e.key === '0') {
                        setActiveTab('home');
                        setShowMenu(false);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [activeTab]);

            return (
                <div className="h-screen w-full flex flex-col font-serif overflow-hidden select-none bg-black text-gray-200">

                    <StudioModal studio={selectedStudio} onClose={() => setSelectedStudio(null)} />

                    {/* Header */}
                    {/* Header - Fixed so always visible */}
                    <div className={`fixed top-0 left-0 right-0 bg-black border-b border-[#333] py-4 z-40 flex justify-between items-center px-8 shadow-2xl transition-all duration-500 ${showMenu ? 'pr-80' : ''}`}>
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => setActiveTab('home')}>
                            <div className="w-8 h-8 border border-[#D4AF37] flex items-center justify-center transition-all hover:bg-[#D4AF37]/10">
                                <span className="text-[#D4AF37] text-xl font-serif brand-font">A</span>
                            </div>
                        </div>

                        {/* Persistent Navigation - Center (hidden on mobile) */}
                        <div className="hidden xl:flex items-center gap-2 absolute left-1/2 transform -translate-x-1/2">
                            {currentMenuItems.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`px-2 py-1 text-[9px] border tracking-[0.15em] transition-all ${activeTab === item.id ? 'border-[#D4AF37] text-[#D4AF37]' : 'border-[#444] text-gray-400 hover:border-[#D4AF37] hover:text-[#D4AF37]'}`}
                                >
                                    {item.label}
                                </button>
                            ))}
                        </div>

                        <div className="ml-auto flex items-center gap-2">
                            <button
                                onClick={handleTogglePrivate}
                                className={`text-xs border px-3 py-2 uppercase transition-all tracking-widest brand-font ${isPrivateMode ? 'border-purple-500 text-purple-400 hover:bg-purple-900/30' : 'border-gray-600 text-gray-500 hover:border-[#D4AF37] hover:text-[#D4AF37]'}`}
                            >
                                {isPrivateMode ? 'Private' : 'Public'}
                            </button>
                            <button
                                onClick={() => setShowMenu(!showMenu)}
                                className="text-[#D4AF37] text-xs border border-[#D4AF37] px-4 py-2 uppercase hover:bg-[#D4AF37] hover:text-black transition-all tracking-widest brand-font"
                            >
                                {showMenu ? 'Close' : 'Menu'}
                            </button>
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex flex-1 overflow-hidden relative pt-12">

                        {/* Content Area - takes 2/3 when menu open, full width otherwise */}
                        <div 
                            className={`flex-1 relative overflow-y-auto bg-[#111] transition-all duration-500 ${showMenu ? 'w-2/3' : 'w-full'}`}
                            onClick={() => showMenu && setShowMenu(false)}
                        >
                            <div className="min-h-full flex flex-col border-l border-[#333]">
{activeTab === 'home' && <HomePillar navigate={setActiveTab} />}
                                {activeTab === 'profile' && <ProfilePillar />}
                                {activeTab === 'principles' && <PrinciplesPillar />}
                                {activeTab === 'arts' && <ArtsPillar onSelectStudio={setSelectedStudio} />}
                                {activeTab === 'assets' && <AssetsPillar navigate={setActiveTab} />}
                                {isPrivateMode && activeTab === 'projected' && <ProjectedRevenuePillar />}
                                {activeTab === 'catalog' && <CatalogPillar />}
                                {isPrivateMode && activeTab === 'stakeholders' && <StakeholdersPillar />}
                                {activeTab === 'lexicon' && <LexiconPillar />}
                                {isPrivateMode && activeTab === 'publications' && <PublicationsPillar />}
                                {isPrivateMode && activeTab === 'knowledge' && <KnowledgePillar />}
                                {activeTab === 'worldmap' && <WorldMapPillar />}
                            </div>
                        </div>

                        {/* Sliding Sidebar Menu - right 1/3 on desktop */}
                        <div 
                            className={`fixed top-12 right-0 h-[calc(100vh-3rem)] w-1/3 bg-[#050505] border-l border-[#D4AF37]/30 z-30 shadow-[-10px_0_40px_rgba(0,0,0,0.8)] transform transition-transform duration-500 ease-in-out ${showMenu ? 'translate-x-0' : 'translate-x-full'}`}
                            onClick={e => e.stopPropagation()}
                        >
                            {/* Menu Content */}
                            <div className="flex flex-col h-full py-8 px-6 overflow-y-auto" onClick={e => e.stopPropagation()}>
                                <div className="space-y-6 flex-1">
                                    <div className="text-center mb-6 opacity-80">
                                        <p className="text-[10px] text-gray-600 uppercase tracking-[0.4em] mb-2 brand-font">Navigation</p>
                                        <div className="w-8 h-[1px] bg-[#D4AF37] mx-auto"></div>
                                    </div>

                                    <nav className="flex flex-col gap-2">
                                        {menuItems.map((item, index) => (
                                            <button
                                                key={item.id}
                                                onClick={() => { setActiveTab(item.id); setShowMenu(false); }}
                                                className={`w-full group mb-2 px-4 py-3 flex items-center justify-between font-serif text-sm tracking-widest transition-all duration-200 brand-font ${activeTab === item.id ? 'bg-[#D4AF37] text-black border-2 border-[#D4AF37] shadow-[0_0_10px_#D4AF37]' : 'bg-black text-[#D4AF37] border-2 border-[#D4AF37] hover:bg-[#1a1a1a]'}`}
                                            >
                                                <span className="flex items-center gap-3">
                                                    <span className={`text-[9px] border px-1.5 py-0.5 rounded-none transition-colors ${activeTab === item.id ? 'border-black text-black' : 'border-[#D4AF37]/50 text-[#D4AF37]/70 group-hover:border-[#D4AF37]'}`}>
                                                        {index + 1}
                                                    </span>
                                                    <span>{item.label}</span>
                                                </span>
                                                <span className={`text-[10px] opacity-0 group-hover:opacity-100 transition-opacity ${activeTab === item.id ? 'text-black' : 'text-[#D4AF37]'}`}>
                                                    ↵
                                                </span>
                                            </button>
                                        ))}
                                    </nav>
                                </div>

                                {/* Social links under Menu: X and Instagram */}
                                <div className="flex items-center justify-center gap-6 mt-4 px-4 pb-6">
                                    <a href="https://x.com/allmergroup" target="_blank" rel="noreferrer" aria-label="X" className="text-[#D4AF37] hover:text-white">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-label="X">
                                            <line x1="6" y1="6" x2="18" y2="18"></line>
                                            <line x1="6" y1="18" x2="18" y2="6"></line>
                                        </svg>
                                    </a>
                                    <a href="https://instagram.com/allmergroup" target="_blank" rel="noreferrer" aria-label="Instagram" className="text-[#D4AF37] hover:text-white">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-label="Instagram">
                                            <rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect>
                                            <circle cx="12" cy="12" r="3"></circle>
                                            <circle cx="17.5" cy="6.5" r="1.5"></circle>
                                        </svg>
                                    </a>
                                </div>

                                {/* Footer */}
                                <div className="text-center opacity-40 mt-4 pt-4 border-t border-[#333]">
                                    <div className="w-6 h-6 mx-auto mb-1 text-[#D4AF37]">
                                        <Scroll className="w-6 h-6" />
                                    </div>
                                    <p className="text-[8px] text-gray-500 uppercase tracking-widest leading-loose">
                                        Paris • London • Vienna
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* FIXED FOOTER */}
                    <div className="fixed bottom-0 w-full bg-black border-t border-[#333] text-center py-2 z-50">
                        <span className="text-gray-500 text-[10px] font-serif tracking-widest">
                            © Allmer Group 2020-2026
                        </span>
                    </div>

                    {/* PIN Modal for Private Access */}
                    {showPinModal && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center">
                            <div className="bg-[#0a0a0a] border border-[#333] p-8 max-w-sm w-full">
                                <h3 className="text-[#D4AF37] brand-font text-lg mb-4">Enter PIN to Access Private</h3>
                                <input
                                    type="password"
                                    value={pinInput}
                                    onChange={e => setPinInput(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && authenticatePrivate(pinInput)}
                                    className="w-full bg-[#111] border border-[#333] text-white px-4 py-3 mb-4 focus:border-[#D4AF37] focus:outline-none"
                                    placeholder="PIN"
                                    autoFocus
                                />
                                <div className="flex gap-2">
                                    <button
                                        onClick={handleAuthenticatedAccess}
                                        className="flex-1 bg-[#D4AF37] text-black py-3 uppercase tracking-widest brand-font hover:bg-[#D4AF37]/80"
                                    >
                                        Access
                                    </button>
                                    <button
                                        onClick={() => { setShowPinModal(false); setPinInput(''); }}
                                        className="flex-1 border border-[#333] text-gray-400 py-3 uppercase tracking-widest brand-font hover:border-[#D4AF37] hover:text-[#D4AF37]"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
