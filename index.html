                if (data.length === 0) return [];
                if (data.length === 1) {
                    return [{ ...data[0], x, y, width, height }];
                }

                const totalValue = data.reduce((sum, d) => sum + d.count, 0);
                let splitIndex = 1;
                let leftValue = data[0].count;
                
                for (let i = 1; i < data.length - 1; i++) {
                    if (Math.abs((leftValue + data[i].count) / totalValue - 0.5) < Math.abs(leftValue / totalValue - 0.5)) {
                        leftValue += data[i].count;
                        splitIndex = i + 1;
                    } else {
                        break;
                    }
                }

                const leftData = data.slice(0, splitIndex);
                const rightData = data.slice(splitIndex);

                if (horizontal) {
                    const leftWidth = (leftValue / totalValue) * width;
                    return [
                        ...getLayout(leftData, leftWidth, height, x, y, !horizontal),
                        ...getLayout(rightData, width - leftWidth, height, x + leftWidth, y, !horizontal)
                    ];
                } else {
                    const leftHeight = (leftValue / totalValue) * height;
                    return [

                                            <h3 className="text-[#D4AF37] font-bold mb-2">Network Effects</h3>
                                            <p className="mb-4 leading-relaxed">The more certified members in a hub, the more cross-discipline exchange occurs. A woodworker who gains access to a stone specialist creates multi-material products that neither could produce alone. Knowledge does not stay in individual heads. Foundry Labs encodes tacit expertise into standards, techniques, and training protocols that propagate across the network.</p>
                                            <h3 className="text-[#D4AF37] font-bold mb-2">Certification and Access</h3>
                                            <p className="leading-relaxed">Membership in the Foundry network is earned, not purchased. Certified members receive sustained work, access to the broader network and its collaborative projects, knowledge preservation infrastructure, and participation in long-term Allmer productions. The benefits compound with tenure. The cost of leaving rises proportionally.</p>

                                            <p>In the right room — a hotel acquisition meeting, a private collector's study, a Michelin-starred kitchen — "is this made by Foundry" is the entire campaign. This is the Hermès model applied to manufacturing infrastructure: quiet, specific, and inaccessible by definition to those who have not earned proximity to it.</p>

                                                        <span className={`text-sm font-mono ${activeCity === city.name ? 'text-[#D4AF37]' : city.active ? 'text-gray-300' : 'text-gray-600'} group-hover:text-gray-100 transition-colors`}>
                                                            {city.name}
                                                        </span>
                                                    </div>
                                                    <span className="text-gray-700 text-[9px] font-mono uppercase tracking-wider">{city.country}</span>

                            })}
                        </div>

                    </div>
                </div>
            );
        };

        const ScriptsVault = ({ embedded = false }) => {
            const { useRef, useEffect, useCallback } = React;

            const baseData = [
                {
                    brand: 'American Portrait', brandId: 'american-portrait', color: '#D4AF37',
                    series: [
                        {
                            name: 'Kissinger', seriesId: 'kissinger',
                            products: [
                                {
                                    id: 'kissinger-awd', name: 'Kissinger: A World Destroyed',
                                    type: 'Comic', docType: 'Script',
                                    versions: [{ versionId: 'r1', version: '2026.05', date: '2026.05.19', isCurrent: true, source: 'repo',
                                        files: { pdf: 'scripts/american-portrait/kissinger/Kissinger_A_World_Destroyed_2026.05.pdf',
                                                 fadein: 'scripts/american-portrait/kissinger/Kissinger_A_World_Destroyed_2026.05.fadein' } }]
                                }
                            ]
                        }
                    ],
                    products: []
                },
                {
                    brand: 'Scaretales', brandId: 'scaretales', color: '#EF5350',
                    series: [],
                    products: [
                        {
                            id: 'the-amulett', name: 'The Amulett',
                            type: 'Film', docType: 'Treatment',
                            versions: [{ versionId: 'r1', version: '2026.05', date: '2026.05.18', isCurrent: true, source: 'repo',
                                files: { pdf: 'scripts/scaretales/the-amulett/The_Amulett_Treatment_2026.05.pdf',
                                         docx: 'scripts/scaretales/the-amulett/The_Amulett_Treatment_2026.05.docx' } }]
                        }
                    ]
                }
            ];

            const [data, setData] = useState(baseData);
            const [selectedProductId, setSelectedProductId] = useState(null);
            const [selectedBrandId, setSelectedBrandId] = useState(null);
            const [selectedSeriesId, setSelectedSeriesId] = useState(null);
            const [showHistory, setShowHistory] = useState(false);
            const [uploading, setUploading] = useState(false);
            const [uploadStatus, setUploadStatus] = useState('');
            const fileInputRef = useRef(null);
            const uploadProductIdRef = useRef(null);

            const getAllProducts = (d) => {
                const all = [];
                (d || data).forEach(brand => {
                    brand.series.forEach(s => s.products.forEach(p => all.push({ ...p, brandId: brand.brandId, brandName: brand.brand, brandColor: brand.color, seriesId: s.seriesId, seriesName: s.name })));
                    (brand.products || []).forEach(p => all.push({ ...p, brandId: brand.brandId, brandName: brand.brand, brandColor: brand.color, seriesId: null, seriesName: null }));
                });
                return all;
            };

            const currentBrand = data.find(b => b.brandId === selectedBrandId);
            const visibleProducts = selectedSeriesId
                ? (currentBrand?.series.find(s => s.seriesId === selectedSeriesId)?.products || [])
                : (currentBrand?.products || []);
            const selectedProduct = getAllProducts().find(p => p.id === selectedProductId);
            const currentVersion = selectedProduct?.versions?.find(v => v.isCurrent) || selectedProduct?.versions?.[0];

            /* ── IndexedDB helpers ── */
            const openDB = () => new Promise((res, rej) => {
                const r = indexedDB.open('AllmerScripts', 1);
                r.onupgradeneeded = e => e.target.result.createObjectStore('uploads', { keyPath: 'key' });
                r.onsuccess = e => res(e.target.result);
                r.onerror = e => rej(e.target.error);
            });
            const idbPut = (key, val) => openDB().then(db => new Promise((res, rej) => {
                const tx = db.transaction('uploads', 'readwrite');
                tx.objectStore('uploads').put({ key, ...val });
                tx.oncomplete = res; tx.onerror = e => rej(e.target.error);
            }));
            const idbGet = (key) => openDB().then(db => new Promise((res, rej) => {
                const tx = db.transaction('uploads', 'readonly');
                const r = tx.objectStore('uploads').get(key);
                r.onsuccess = e => res(e.target.result); r.onerror = e => rej(e.target.error);
            }));

            /* ── Load IDB versions on mount ── */
            useEffect(() => {
                getAllProducts().forEach(p => {
                    idbGet(`meta_${p.id}`).then(rec => {
                        if (!rec?.versions?.length) return;
                        setData(prev => prev.map(brand => ({
                            ...brand,
                            series: brand.series.map(s => ({ ...s, products: s.products.map(q => q.id !== p.id ? q : { ...q, versions: [...rec.versions, ...q.versions.filter(v => v.source === 'repo')] }) })),
                            products: (brand.products||[]).map(q => q.id !== p.id ? q : { ...q, versions: [...rec.versions, ...q.versions.filter(v => v.source === 'repo')] })
                        })));
                    }).catch(() => {});
                });
            }, []);

            const getToday = () => { const d = new Date(); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; };
            const nextVersion = (existing) => {
                const d = new Date();
                const base = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}`;
                const count = existing.filter(v => v.version.startsWith(base)).length;
                return count === 0 ? base : `${base}.${count}`;
            };

            const handleFileSelected = async (e) => {
                const file = e.target.files[0];
                if (!file || !uploadProductIdRef.current) return;
                setUploading(true); setUploadStatus('Reading…');
                try {
                    const buffer = await file.arrayBuffer();
                    const ext = file.name.split('.').pop().toLowerCase();
                    const pid = uploadProductIdRef.current;
                    const prod = getAllProducts().find(p => p.id === pid);
                    const ver = nextVersion(prod?.versions || []);
                    const newV = { versionId: `idb_${Date.now()}`, version: ver, date: getToday(), isCurrent: true, source: 'idb', files: { [ext]: `idb:${pid}:${ver}:${ext}` } };
                    await idbPut(`file_${pid}_${ver}_${ext}`, { buffer, filename: file.name });
                    setData(prev => {
                        const next = prev.map(brand => ({
                            ...brand,
                            series: brand.series.map(s => ({ ...s, products: s.products.map(p => p.id !== pid ? p : { ...p, versions: [newV, ...p.versions.map(v => ({...v, isCurrent: false}))] }) })),
                            products: (brand.products||[]).map(p => p.id !== pid ? p : { ...p, versions: [newV, ...p.versions.map(v => ({...v, isCurrent: false}))] })
                        }));
                        const idbVersions = getAllProducts(next).find(p => p.id === pid)?.versions.filter(v => v.source === 'idb') || [];
                        idbPut(`meta_${pid}`, { versions: idbVersions });
                        return next;
                    });
                    setUploadStatus('✓ Uploaded');
                    setTimeout(() => setUploadStatus(''), 3000);
                } catch(err) { setUploadStatus('Error: ' + err.message); }
                finally { setUploading(false); e.target.value = ''; }
            };

            const handleDownload = async (files, fmt, prodName, ver) => {
                const val = files[fmt]; if (!val) return;
                if (val.startsWith('idb:')) {
                    const [, pid, v, ext] = val.split(':');
                    const rec = await idbGet(`file_${pid}_${v}_${ext}`);
                    if (!rec) return;
                    const mime = { pdf:'application/pdf', docx:'application/vnd.openxmlformats-officedocument.wordprocessingml.document', fadein:'application/octet-stream' };
                    const blob = new Blob([rec.buffer], { type: mime[ext]||'application/octet-stream' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = rec.filename || `${prodName}_${v}.${ext}`; a.click();
                    setTimeout(() => URL.revokeObjectURL(url), 3000);
                } else {
                    const a = document.createElement('a'); a.href = val; a.download = val.split('/').pop(); a.click();
                }
            };

            const fmtColor = { pdf: '#EF5350', docx: '#4FC3F7', fadein: '#A78BFA' };
            const fmtLabel = { pdf: 'PDF', docx: 'DOCX', fadein: 'FADEIN' };
            const typeColor = { Comic: '#D4AF37', Film: '#4FC3F7', Game: '#A78BFA' };

            const scriptsInner = (
                <>
                    <input ref={fileInputRef} type="file" accept=".pdf,.docx,.fadein" className="hidden" onChange={handleFileSelected} />

                        {/* ── LEFT: Brand / Series / Product nav ── */}

                            <div>

                                        <button key={brand.brandId}

                                                const firstProd = firstSeries?.products[0] || brand.products?.[0];
                                                if (firstProd) setSelectedProductId(firstProd.id);
                                            }}
                                            className={`text-left px-3 py-2 border text-[11px] font-mono uppercase tracking-wider transition-all flex items-center gap-2 ${selectedBrandId === brand.brandId ? 'border-[#D4AF37] bg-[#D4AF37]/10 text-[#D4AF37]' : 'border-[#222] text-gray-500 hover:border-[#444] hover:text-gray-300'}`}>
                                            <span className="inline-block w-2 h-2 rotate-45 shrink-0" style={{ background: brand.color, boxShadow: `0 0 5px ${brand.color}` }}></span>
                                            {brand.brand}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {currentBrand?.series?.length > 0 && (
                                <div>
                                    <p className="text-[9px] font-mono uppercase tracking-[0.25em] text-gray-600 mb-2">Series</p>
                                    <div className="flex flex-col gap-1">
                                        {currentBrand.series.map(s => (
                                            <button key={s.seriesId}
                                                onClick={() => { setSelectedSeriesId(s.seriesId); if (s.products[0]) setSelectedProductId(s.products[0].id); }}
                                                className={`text-left px-3 py-2 border text-[11px] font-mono uppercase tracking-wider transition-all ${selectedSeriesId === s.seriesId ? 'border-[#D4AF37]/50 bg-[#D4AF37]/5 text-gray-200' : 'border-[#1a1a1a] text-gray-600 hover:border-[#333] hover:text-gray-400'}`}>
                                                — {s.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div>
                                <p className="text-[9px] font-mono uppercase tracking-[0.25em] text-gray-600 mb-2">Production</p>
                                <div className="flex flex-col gap-1">

                                        <button key={p.id} onClick={() => setSelectedProductId(p.id)}
                                            className={`text-left px-3 py-2.5 border transition-all ${selectedProductId === p.id ? 'border-[#D4AF37] bg-[#D4AF37]/10' : 'border-[#1a1a1a] hover:border-[#333]'}`}>
                                            <div className={`text-[11px] font-mono leading-tight ${selectedProductId === p.id ? 'text-[#D4AF37]' : 'text-gray-400'}`}>{p.name}</div>
                                            <div className="flex gap-2 mt-1.5 flex-wrap">
                                                <span className="text-[8px] font-mono uppercase tracking-wider px-1.5 py-0.5 border" style={{ borderColor: (typeColor[p.type]||'#555')+'99', color: typeColor[p.type]||'#999' }}>{p.type}</span>
                                                <span className="text-[8px] font-mono uppercase tracking-wider text-gray-600">{p.docType}</span>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* ── RIGHT: Document viewer ── */}
                        <div className="md:col-span-2">
                            {selectedProduct && currentVersion ? (
                                <div className="border border-[#D4AF37]/25 bg-[#050505]" style={{ boxShadow: '0 0 40px rgba(212,175,55,0.04)' }}>

                                                    {selectedProduct.brandName}{selectedProduct.seriesName ? ` · ${selectedProduct.seriesName}` : ''}

                                                    <span className="text-[8px] font-mono uppercase tracking-wider px-2 py-0.5 border" style={{ borderColor: (typeColor[selectedProduct.type]||'#555')+'99', color: typeColor[selectedProduct.type]||'#999' }}>{selectedProduct.type}</span>
                                                    <span className="text-[8px] font-mono uppercase tracking-wider px-2 py-0.5 border border-[#333] text-gray-500">{selectedProduct.docType}</span>

                                            {['pdf','docx','fadein'].map(fmt => currentVersion.files[fmt] && (
                                                <button key={fmt}

                                            <p className="text-[9px] font-mono uppercase tracking-[0.2em] text-gray-600">Upload New Version</p>

                                            className="shrink-0 px-4 py-2 border border-[#D4AF37]/40 text-[#D4AF37] text-[9px] font-mono uppercase tracking-widest hover:bg-[#D4AF37]/10 transition-all disabled:opacity-40">

                                    {/* Version history */}

                                            <span style={{ display:'inline-block', transition:'transform 0.2s', transform: showHistory ? 'rotate(90deg)' : 'none' }}>▶</span>

                                                                <span className="font-mono text-xs text-white">v{v.version}</span>
                                                                {v.isCurrent && <span className="text-[8px] font-mono uppercase text-green-500/60">● Current</span>}

                                                        </div>
                                                        <div className="flex gap-2 flex-wrap">
                                                            {['pdf','docx','fadein'].map(fmt => v.files[fmt] && (
                                                                <button key={fmt}
                                                                    onClick={() => handleDownload(v.files, fmt, selectedProduct.name, v.version)}
                                                                    className="text-[8px] font-mono uppercase px-2 py-1 border transition-all hover:opacity-70"
                                                                    style={{ borderColor: fmtColor[fmt]+'60', color: fmtColor[fmt] }}>

                        >

                                <img
                                    src={tool.img}
                                    alt={tool.label}
                                    className={`
                                        object-contain transition-all duration-700

// All menu items (visible only after PIN)

                    }
                    
                    // H → landing page
                    if (e.key === 'h' || e.key === 'H') {
                        setActiveTab('home'); setShowMenu(false);
                    }

                    // Number key shortcuts: 1-9 for items 1-9, 0 for the last item (Scripts)
                    const keyNum = parseInt(e.key);
                    if (e.key === '0') {
                        const item = visibleMenuItems[visibleMenuItems.length - 1];
                        if (item) { setActiveTab(item.id); setShowMenu(false); }
                    } else if (!isNaN(keyNum) && keyNum >= 1 && keyNum <= visibleMenuItems.length) {

                        setActiveTab(item.id);
                        setShowMenu(false);
                    }

                    // Comma (backward) and Period (forward)
                    if (e.key === ',' || e.key === '<' || e.key === '.' || e.key === '>') {

                            nextIndex = currentIndex === -1 ? 0 : (currentIndex + 1) % visibleMenuItems.length;
                        }

                        setActiveTab(visibleMenuItems[nextIndex].id);
                        setShowMenu(false);
                    }

                    // 0 (Home/Main Menu)
                    if (e.key === '0') {
                        setActiveTab('home');

{activeTab === 'home' && <HomePillar navigate={setActiveTab} />}

                        {/* Sliding Sidebar Menu - right 1/3 on desktop */}
                        <div 
                            className={`fixed top-12 right-0 h-[calc(100vh-3rem)] w-[85%] sm:w-1/2 md:w-1/3 bg-[#050505] border-l border-[#D4AF37]/30 z-30 shadow-[-10px_0_40px_rgba(0,0,0,0.8)] transform transition-transform duration-500 ease-in-out ${showMenu ? 'translate-x-0' : 'translate-x-full'}`}
                            onClick={e => e.stopPropagation()}
                        >
                            {/* Menu Content */}
                            <div className="flex flex-col h-full py-8 px-6 overflow-y-auto" onClick={e => e.stopPropagation()}>
                                <div className="space-y-6 flex-1">
                                    <div className="text-center mb-6 opacity-80">
                                        <p className="text-[10px] text-gray-600 uppercase tracking-[0.4em] mb-2 brand-font">Navigation</p>
                                        <div className="w-8 h-[1px] bg-[#D4AF37] mx-auto"></div>
                                    </div>

                                    <nav className="flex flex-col gap-2">
                                        {visibleMenuItems.map((item, index) => (
                                            <button
                                                key={item.id}
                                                onClick={() => { setActiveTab(item.id); setShowMenu(false); }}
                                                className={`w-full group mb-2 px-4 py-3 flex items-center justify-between font-serif text-sm tracking-widest transition-all duration-200 brand-font ${activeTab === item.id ? 'bg-[#D4AF37] text-black border-2 border-[#D4AF37] shadow-[0_0_10px_#D4AF37]' : 'bg-black text-[#D4AF37] border-2 border-[#D4AF37] hover:bg-[#1a1a1a]'}`}
                                            >
                                                <span className="flex items-center gap-3">
                                                    <span className={`text-[9px] border px-1.5 py-0.5 rounded-none transition-colors ${activeTab === item.id ? 'border-black text-black' : 'border-[#D4AF37]/50 text-[#D4AF37]/70 group-hover:border-[#D4AF37]'}`}>
                                                        {index + 1}
                                                    </span>
                                                    <span>{item.label}</span>
                                                </span>
                                                <span className={`text-[10px] opacity-0 group-hover:opacity-100 transition-opacity ${activeTab === item.id ? 'text-black' : 'text-[#D4AF37]'}`}>
                                                    ↵
                                                </span>
                                            </button>
                                        ))}
                                    </nav>
                                </div>

                                {/* Social links under Menu: X and Instagram */}
                                <div className="flex items-center justify-center gap-6 mt-4 px-4 pb-6">
                                    <a href="https://x.com/allmergroup" target="_blank" rel="noreferrer" aria-label="X" className="text-[#D4AF37] hover:text-white">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-label="X">
                                            <line x1="6" y1="6" x2="18" y2="18"></line>
                                            <line x1="6" y1="18" x2="18" y2="6"></line>
                                        </svg>
                                    </a>
                                    <a href="https://instagram.com/allmergroup" target="_blank" rel="noreferrer" aria-label="Instagram" className="text-[#D4AF37] hover:text-white">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                            <rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect>
                                            <circle cx="12" cy="12" r="3"></circle>
                                            <circle cx="17.5" cy="6.5" r="1.5"></circle>
                                        </svg>
                                    </a>
                                    <a href="https://www.linkedin.com/in/simon-allmer-64292a17a/" target="_blank" rel="noreferrer" aria-label="LinkedIn" className="text-[#D4AF37] hover:text-white">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                            <rect x="2" y="2" width="20" height="20" rx="3" ry="3"></rect>
                                            <line x1="8" y1="11" x2="8" y2="16"></line>
                                            <line x1="8" y1="8" x2="8" y2="8.01"></line>
                                            <line x1="12" y1="16" x2="12" y2="11"></line>
                                            <path d="M12 11a4 4 0 0 1 4 4v1"></path>
                                        </svg>
                                    </a>
                                </div>

                                {/* Footer */}
                                <div className="text-center opacity-40 mt-4 pt-4 border-t border-[#333]">
                                    <div className="w-6 h-6 mx-auto mb-1 text-[#D4AF37]">
                                        <Scroll className="w-6 h-6" />
                                    </div>
                                    <p className="text-[8px] text-gray-500 uppercase tracking-widest leading-loose">
                                        Paris • London • Vienna
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* FIXED FOOTER */}
                    <div className="fixed bottom-0 w-full bg-black border-t border-[#333] text-center py-2 z-50 flex flex-col items-center gap-1">
                        <div className="flex items-center gap-4">
                            <a href="https://x.com/allmergroup" target="_blank" rel="noreferrer" aria-label="X" className="text-gray-600 hover:text-[#D4AF37] transition-colors">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="6" y1="18" x2="18" y2="6"></line></svg>
                            </a>
                            <a href="https://instagram.com/allmergroup" target="_blank" rel="noreferrer" aria-label="Instagram" className="text-gray-600 hover:text-[#D4AF37] transition-colors">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="5" ry="5"></rect><circle cx="12" cy="12" r="3"></circle><circle cx="17.5" cy="6.5" r="1.5"></circle></svg>
                            </a>
                            <a href="https://www.linkedin.com/in/simon-allmer-64292a17a/" target="_blank" rel="noreferrer" aria-label="LinkedIn" className="text-gray-600 hover:text-[#D4AF37] transition-colors">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="3" ry="3"></rect><line x1="8" y1="11" x2="8" y2="16"></line><line x1="8" y1="8" x2="8" y2="8.01"></line><line x1="12" y1="16" x2="12" y2="11"></line><path d="M12 11a4 4 0 0 1 4 4v1"></path></svg>
                            </a>
                        </div>
                        <span className="text-gray-500 text-[10px] font-serif tracking-widest">© 2020-2026 Allmer Group</span>
                    </div>

                    {/* PIN Modal for Private Access */}
                    {showPinModal && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center">
                            <div className="bg-[#0a0a0a] border border-[#333] p-8 max-w-sm w-full">
                                <h3 className="text-[#D4AF37] brand-font text-lg mb-4">Enter PIN to Access Private</h3>
                                <input
                                    type="password"
                                    value={pinInput}
                                    onChange={e => setPinInput(e.target.value)}
                                    onKeyDown={e => e.key === 'Enter' && authenticatePrivate(pinInput)}
                                    className="w-full bg-[#111] border border-[#333] text-white px-4 py-3 mb-4 focus:border-[#D4AF37] focus:outline-none"
                                    placeholder="PIN"
                                    autoFocus
                                />
                                <div className="flex gap-2">
                                    <button
                                        onClick={handleAuthenticatedAccess}
                                        className="flex-1 bg-[#D4AF37] text-black py-3 uppercase tracking-widest brand-font hover:bg-[#D4AF37]/80"
                                    >
                                        Access
                                    </button>
                                    <button
                                        onClick={() => { setShowPinModal(false); setPinInput(''); }}
                                        className="flex-1 border border-[#333] text-gray-400 py-3 uppercase tracking-widest brand-font hover:border-[#D4AF37] hover:text-[#D4AF37]"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
